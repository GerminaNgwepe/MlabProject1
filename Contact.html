<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>

    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea {
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" placeholder="E.g Germina Ngwepe" id="name" name="name" required>
        
        <label for="email">Email:</label>
        <input type="email" placeholder="E.g germinameps@zoner.com" id="email" name="email" required>
        
        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="How can I make a booking/ consultation" rows="5" required></textarea>
        
        <button type="submit">Send</button>
    </form> <br>
    <br>

    <button type="button" onclick="window.location.href='Home.html'">Back to Home</button>
